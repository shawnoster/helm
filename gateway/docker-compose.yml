services:
  gateway:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-unknown}
    image: aya-gateway:latest
    container_name: aya-gateway
    restart: always
    env_file:
      - /run/secrets/gateway.env
    environment:
      - TZ=America/Los_Angeles
    ports:
      - "8080:8080/tcp"
    network_mode: synobridge
    security_opt:
      - no-new-privileges:true
