name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    # No path filter on pull_request: the "Lint, type-check, test" job is
    # a required status check via the Protect main ruleset, and
    # path-filtered required checks never report on PRs that don't touch
    # the filtered paths — leaving doc-only PRs blocked indefinitely.
    # Always running CI on PRs reports the check; uv cache keeps it fast.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check src tests

      - name: Format check
        run: uv run ruff format --check src tests

      - name: Type check
        run: uv run mypy src

      - name: Tests
        run: uv run pytest
