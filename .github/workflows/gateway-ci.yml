name: Gateway CI

on:
  push:
    branches: [main]
    paths:
      - "gateway/**"
      - ".github/workflows/gateway-ci.yml"
  pull_request:
    branches: [main]
    # No path filter on pull_request — same reasoning as the main aya
    # workflow: required status checks gated on path filters never
    # report on PRs that don't touch those paths, blocking unrelated
    # PRs indefinitely. uv cache keeps this fast.
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Gateway lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gateway

    steps:
      - uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy app

      - name: Tests
        run: uv run pytest
